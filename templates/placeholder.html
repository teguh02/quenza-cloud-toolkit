{% extends "base.html" %}

{% block title %}{{ page_title }} &middot; {{ app_name }}{% endblock %}

{% block content %}
<div class="flex min-h-[420px] items-center justify-center">
  <div class="w-full max-w-lg rounded-3xl border border-line bg-surface p-10 text-center shadow-card">
    <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-2xl bg-{{ tone }}">
      <span class="{{ fg }}">
        {% include "partials/icons/" + icon + ".html" ignore missing %}
      </span>
    </div>

    <h2 class="mt-6 text-xl font-bold text-heading">{{ page_title }}</h2>
    <p class="mt-2 text-sm text-secondary">{{ page_subtitle }}</p>

    <div class="mt-6 inline-flex items-center gap-2 rounded-full border border-line bg-canvas px-4 py-2">
      <span class="h-2 w-2 rounded-full bg-brand-gradient"></span>
      <span class="text-xs font-semibold text-secondary">{{ note }}</span>
    </div>

    <div class="mt-8">
      <a
        href="/"
        class="inline-flex items-center gap-2 rounded-xl border border-line bg-surface px-4 py-2.5 text-sm font-semibold text-secondary transition-all duration-quenza ease-quenza hover:border-brand-teal/30 hover:text-heading hover:shadow-card"
      >
        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Kembali ke Dashboard
      </a>
    </div>
  </div>
</div>
{% endblock %}
