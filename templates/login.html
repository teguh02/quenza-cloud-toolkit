<!DOCTYPE html>
<html lang="id" class="h-full">
  <head>
    {% include "partials/head.html" %}
  </head>
  <body class="relative h-full bg-canvas font-sans text-heading antialiased">
    {# Soft decorative background #}
    <div class="pointer-events-none absolute inset-0 overflow-hidden" aria-hidden="true">
      <div class="absolute -left-24 -top-24 h-96 w-96 rounded-full bg-brand-green/10 blur-3xl"></div>
      <div class="absolute -bottom-24 -right-24 h-96 w-96 rounded-full bg-brand-teal/10 blur-3xl"></div>
    </div>

    <div class="relative flex min-h-full items-center justify-center px-4 py-12">
      <div class="w-full max-w-md">
        {# Login card #}
        <div class="rounded-3xl border border-line bg-surface p-8 shadow-card sm:p-10">
          {# Brand #}
          <div class="mb-8 flex flex-col items-center text-center">
            <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-brand-gradient shadow-card">
              <svg class="h-7 w-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
            </div>
            <h1 class="mt-4 text-2xl font-extrabold tracking-tight text-heading">Quenza Cloud Toolkit</h1>
            <p class="mt-1 text-sm text-secondary">Masukkan Master Password untuk melanjutkan</p>
          </div>

          {# Error state (Quenza soft red) #}
          {% if error %}
          <div class="mb-5 flex items-start gap-3 rounded-xl border border-red-100 bg-red-50 px-4 py-3" role="alert">
            <svg class="mt-0.5 h-4 w-4 shrink-0 text-red-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            <p class="text-sm font-medium text-red-600">{{ error }}</p>
          </div>
          {% endif %}

          {# Form #}
          <form method="post" action="/login" class="space-y-5" autocomplete="off">
            <div>
              <label for="master_password" class="mb-1.5 block text-xs font-semibold uppercase tracking-wide text-label">
                Master Password
              </label>
              <div class="relative">
                <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5 text-label">
                  <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                  </svg>
                </span>
                <input
                  id="master_password"
                  name="master_password"
                  type="password"
                  required
                  autofocus
                  placeholder="••••••••••••"
                  class="quenza-input w-full rounded-xl border border-line bg-canvas py-3 pl-11 pr-11 text-sm text-heading placeholder:text-label transition-all duration-quenza ease-quenza focus:border-brand-teal focus:bg-surface focus:outline-none focus:ring-2 focus:ring-brand-teal/25"
                />
                <button
                  type="button"
                  id="toggle-password"
                  class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-label transition-colors duration-quenza ease-quenza hover:text-secondary"
                  aria-label="Tampilkan password"
                >
                  <svg id="eye-open" class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                  <svg id="eye-closed" class="hidden h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                    <line x1="1" y1="1" x2="23" y2="23" />
                  </svg>
                </button>
              </div>
            </div>

            <button
              type="submit"
              class="group relative w-full overflow-hidden rounded-xl bg-brand-gradient px-4 py-3 text-sm font-semibold text-white shadow-card transition-all duration-quenza ease-quenza hover:shadow-card-hover hover:brightness-[1.03] active:scale-[0.99] focus:outline-none focus:ring-2 focus:ring-brand-teal/40"
            >
              Masuk
            </button>
          </form>
        </div>

        <p class="mt-6 text-center text-xs text-label">
          Akses terbatas &middot; {{ app_name }}
        </p>
      </div>
    </div>

    <script src="/static/js/app.js" defer></script>
  </body>
</html>
